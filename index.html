<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏠 智慧家庭药箱 - 分类智能云同步版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2a9d8f;
            --primary-light: #e7f6f2;
            --secondary: #457b9d;
            --danger: #e63946;
            --danger-light: #ffe3e3;
            --warning: #f4a261;
            --warning-light: #fdf0e6;
            --success: #2b9348;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #6c757d;
            --border-color: #e9ecef;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            padding-bottom: 100px; 
            font-size: 14px;
            min-height: 100vh;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .app-logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sync-badge {
            font-size: 11px;
            background-color: var(--primary-light);
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .alert-banner {
            background-color: var(--danger-light);
            border-left: 4px solid var(--danger);
            color: #c92a2a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
        }

        .stat-num {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .action-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            width: 100%;
        }

        .action-card:active {
            background-color: var(--primary-light);
            transform: scale(0.96);
        }

        .action-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .action-card.voice .action-icon { background-color: #e2f0d9; color: var(--success); }
        .action-card.manual .action-icon { background-color: #e2eafc; color: var(--secondary); }
        .action-title { font-size: 12px; font-weight: bold; color: var(--text-main); }

        /* 搜索和筛选区 */
        .filter-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: var(--bg-color);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 12px;
        }

        .search-bar i { color: var(--text-muted); margin-right: 8px; }
        .search-bar input { border: none; background: transparent; width: 100%; outline: none; font-size: 14px; }

        .filter-label {
            font-size: 11px;
            color: var(--text-muted);
            margin: 6px 0 4px 2px;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            background: var(--bg-color);
            color: var(--text-muted);
            border: none;
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
        }

        .tab.active { background: var(--primary); color: white; }
        .tab.active-cat { background: var(--secondary); color: white; }

        /* 药品卡片列表 */
        .med-list { display: flex; flex-direction: column; gap: 12px; }
        .med-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--success);
            text-align: left;
            width: 100%;
            outline: none;
        }

        .med-card.status-expiry { border-left-color: var(--danger); }
        .med-card.status-warning { border-left-color: var(--warning); }
        .med-card.status-discarded { border-left-color: var(--text-muted); opacity: 0.6; }
        .med-details { flex-grow: 1; padding-right: 12px; }
        .med-title { font-size: 16px; font-weight: bold; margin-bottom: 4px; color: var(--text-main); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .med-spec { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
        .med-info-row { display: flex; gap: 12px; font-size: 11px; color: var(--text-muted); margin-top: 4px; flex-wrap: wrap; }
        .med-info-row span { display: flex; align-items: center; gap: 4px; }

        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .badge-danger { background-color: var(--danger-light); color: var(--danger); }
        .badge-warning { background-color: var(--warning-light); color: var(--warning); }
        .badge-location { background-color: var(--primary-light); color: var(--primary); }
        .badge-category { background-color: #e2eafc; color: var(--secondary); }
        .badge-discarded { background-color: #f1f3f5; color: var(--text-muted); }

        /* 数量控制器 */
        .stock-control { display: flex; align-items: center; gap: 10px; }
        .control-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .stock-num { font-size: 16px; font-weight: bold; width: 24px; text-align: center; }
        .stock-num.low { color: var(--danger); }
        .btn-mini { border: none; background: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 8px; }

        /* 模态框 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: none; justify-content: center; align-items: flex-end; z-index: 1000; }
        .modal { background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; padding: 20px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.25s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        .modal-title { font-size: 18px; font-weight: bold; }
        .modal-close { background: none; border: none; font-size: 24px; color: var(--text-muted); cursor: pointer; padding: 4px 12px; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; outline: none; background: #fff; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card-bg); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 8px 0; padding-bottom: calc(8px + env(safe-area-inset-bottom)); z-index: 999; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: var(--text-muted); font-size: 11px; width: 25%; }
        .nav-item i { font-size: 18px; }
        .nav-item.active { color: var(--primary); }

        .log-item { background: var(--card-bg); border-radius: 8px; padding: 12px; margin-bottom: 8px; font-size: 12px; border-left: 3px solid var(--secondary); display: flex; justify-content: space-between; align-items: center; }
        .log-time { font-size: 10px; color: var(--text-muted); }
        .view-pane { display: none; }
        .view-pane.active { display: block; }

        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.98); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
        #auth-overlay .box { text-align:center; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 80%; max-width: 360px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="box">
            <h3 style="color:var(--primary); margin-top:0;">🔐 输入家庭暗号解锁</h3>
            <p style="color:#666; font-size:13px; margin-bottom:20px;">首次使用请输入专属于你们家的药箱暗号</p>
            <input type="password" id="family-password" placeholder="请输入家庭暗号" style="width:100%; text-align:center; margin-bottom:15px; padding:12px; border:1px solid #cbd5e1; border-radius:8px;"><br>
            <button onclick="verifyPassword()" style="width:100%; background:var(--primary); color:white; border:none; padding:12px; border-radius:8px; font-weight:bold;">解锁药箱</button>
        </div>
    </div>

    <div id="paneHome" class="view-pane active">
        <div class="app-header">
            <div class="app-logo"><i class="fa-solid fa-prescription-bottle-medical"></i> 智慧家庭药箱</div>
            <div class="sync-badge" id="storageStatus"><i class="fa-solid fa-cloud"></i> 正在连接云端...</div>
        </div>

        <div class="alert-banner" id="alertBanner" style="display: none;">
            <i class="fa-solid fa-circle-exclamation"></i>
            <div id="alertBannerText">正在同步药箱统计...</div>
        </div>

        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-num" id="statNormal">0</div>
                <div class="stat-label">正常常备</div>
            </div>
            <div class="stat-card" style="border-bottom: 2px solid var(--warning);">
                <div class="stat-num" id="statWarning">0</div>
                <div class="stat-label" style="color:var(--warning)">临近过期</div>
            </div>
            <div class="stat-card" style="border-bottom: 2px solid var(--danger);">
                <div class="stat-num" id="statExpired">0</div>
                <div class="stat-label" style="color:var(--danger)">已过期</div>
            </div>
        </div>

        <div class="quick-actions">
            <button class="action-card" onclick="openScanModal()">
                <div class="action-icon"><i class="fa-solid fa-barcode"></i></div>
                <div class="action-title">扫码入库</div>
            </button>
            <button class="action-card voice" onclick="openVoiceModal()">
                <div class="action-icon"><i class="fa-solid fa-microphone"></i></div>
                <div class="action-title">语音智能录入</div>
            </button>
            <button class="action-card manual" onclick="openAddModal()">
                <div class="action-icon"><i class="fa-solid fa-pen-to-square"></i></div>
                <div class="action-title">手动录入</div>
            </button>
        </div>

        <div class="filter-section">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="搜索药品名..." oninput="filterMeds()">
            </div>
            
            <div class="filter-label">📍 按存放位置过滤：</div>
            <div class="tabs" id="locationTabs">
                <button class="tab active" onclick="switchLocationTab('全部')">全部位置</button>
                <button class="tab" onclick="switchLocationTab('客厅药箱')">客厅药箱</button>
                <button class="tab" onclick="switchLocationTab('冰箱冷藏')">冰箱冷藏</button>
                <button class="tab" onclick="switchLocationTab('主卧抽屉')">主卧抽屉</button>
            </div>

            <div class="filter-label">💊 按药品类型过滤：</div>
            <div class="tabs" id="categoryTabs">
                <button class="tab active-cat" onclick="switchCategoryTab('全部')">全部类型</button>
                <button class="tab" onclick="switchCategoryTab('感冒发烧')">感冒发烧</button>
                <button class="tab" onclick="switchCategoryTab('肠胃消化')">肠胃消化</button>
                <button class="tab" onclick="switchCategoryTab('皮肤外用')">皮肤外用</button>
                <button class="tab" onclick="switchCategoryTab('抗过敏药')">抗过敏药</button>
                <button class="tab" onclick="switchCategoryTab('消炎镇痛')">消炎镇痛</button>
                <button class="tab" onclick="switchCategoryTab('其他')">其他药品</button>
            </div>
        </div>

        <div class="med-list" id="medListContainer"></div>
    </div>

    <div id="paneDiscarded" class="view-pane">
        <div class="app-header"><div class="app-logo"><i class="fa-solid fa-trash-can"></i> 废弃药品记录</div></div>
        <div class="med-list" id="discardedListContainer"></div>
    </div>

    <div id="paneLogs" class="view-pane">
        <div class="app-header"><div class="app-logo"><i class="fa-solid fa-clock-rotate-left"></i> 家庭取用记录</div></div>
        <div id="logsContainer"></div>
    </div>

    <div id="paneSettings" class="view-pane">
        <div class="app-header"><div class="app-logo"><i class="fa-solid fa-gear"></i> 系统与云端信息</div></div>
        <div style="background: white; padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); line-height: 1.6;">
            <h4><i class="fa-solid fa-cloud-sun"></i> 云端数据实时分类保障</h4>
            <p style="font-size: 13px; color: var(--text-muted); margin-top: 6px;">
                本药箱已全面升级云存储，支持在任意多终端设备同步药名、到期时间、存放位置及药品类目属性。
            </p>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchPane('Home', this)"><i class="fa-solid fa-house-medical"></i><span>药箱首页</span></button>
        <button class="nav-item" onclick="switchPane('Discarded', this)"><i class="fa-solid fa-trash-can"></i><span>废弃清单</span></button>
        <button class="nav-item" onclick="switchPane('Logs', this)"><i class="fa-solid fa-clock-rotate-left"></i><span>流转日志</span></button>
        <button class="nav-item" onclick="switchPane('Settings', this)"><i class="fa-solid fa-circle-info"></i><span>系统信息</span></button>
    </div>

    <div class="modal-overlay" id="addModal" onclick="checkOuterClick(event, 'addModal')">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalFormTitle">💊 录入新药</div>
                <button class="modal-close" onclick="closeModal('addModal')">&times;</button>
            </div>
            <form id="medForm" onsubmit="saveMedication(event)">
                <input type="hidden" id="formMedId">
                <div class="form-row">
                    <div class="form-group">
                        <label>药品名称 *</label>
                        <input type="text" class="form-control" id="formName" required placeholder="如：布洛芬">
                    </div>
                    <div class="form-group">
                        <label>药品类型 *</label>
                        <select class="form-control" id="formCategory" required>
                            <option value="感冒发烧">感冒发烧</option>
                            <option value="肠胃消化">肠胃消化</option>
                            <option value="皮肤外用">皮肤外用</option>
                            <option value="抗过敏药">抗过敏药</option>
                            <option value="消炎镇痛">消炎镇痛</option>
                            <option value="其他" selected>其他</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>规格/包装</label>
                        <input type="text" class="form-control" id="formSpec" placeholder="如：24粒/盒">
                    </div>
                    <div class="form-group">
                        <label>存放位置 *</label>
                        <select class="form-control" id="formLocation" required>
                            <option value="客厅药箱">客厅药箱</option>
                            <option value="冰箱冷藏">冰箱冷藏</option>
                            <option value="主卧抽屉">主卧抽屉</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>截止有效期 *</label>
                        <input type="date" class="form-control" id="formExpiry" required>
                    </div>
                    <div class="form-group">
                        <label>预警提前天数</label>
                        <input type="number" class="form-control" id="formWarnDays" value="30">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>当前库存 *</label>
                        <input type="number" class="form-control" id="formStock" required value="1">
                    </div>
                    <div class="form-group">
                        <label>低位阀值</label>
                        <input type="number" class="form-control" id="formMinStock" required value="2">
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="button" class="form-control" style="background:#e9ecef; border:none;" onclick="closeModal('addModal')">取消</button>
                    <button type="submit" class="form-control" style="background:var(--primary); color:white; border:none; font-weight:bold;">保存数据</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="scanModal" onclick="checkOuterClick(event, 'scanModal')">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title"><i class="fa-solid fa-camera"></i> 模拟扫描条形码</div>
                <button class="modal-close" onclick="closeModal('scanModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>输入预设条形码测试：</label>
                <div style="display:flex; gap:8px;">
                    <input type="text" class="form-control" id="simulatedBarcode" value="6901234567890">
                    <button type="button" class="control-btn" style="width: auto; padding: 0 12px; border-radius: 8px;" onclick="triggerSimulatedScan()">分析</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="voiceModal" onclick="checkOuterClick(event, 'voiceModal')">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title"><i class="fa-solid fa-microphone"></i> 语音指令分词解析</div>
                <button class="modal-close" onclick="closeModal('voiceModal')">&times;</button>
            </div>
            <div class="form-group">
                <input type="text" class="form-control" id="voiceTextInput" placeholder="例如：感冒灵两盒放客厅药箱2027-10-01过期" style="margin-bottom:12px;">
                <button class="form-control" style="background:var(--primary); color:white; border:none;" onclick="processVoiceString()">智能提取输入</button>
            </div>
        </div>
    </div>

    <script>
        // ================= 保持不变的配置 =================
        const SUPABASE_URL = "https://wfyoimahhbzvfnalqaba.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmeW9pbWFoaGJ6dmZuYWxxYWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMzI0MzEsImV4cCI6MjA5NTcwODQzMX0.0WWOa52wv0LNPF2S91R5WKjN5xNmLhqmlpXj4MuUJbM";
        // ============================================================

        const BARCODE_DB = {
            "6901234567890": { name: "芬必得 布洛芬缓释胶囊", spec: "24粒/盒", location: "客厅药箱", category: "消炎镇痛", minStock: 2 },
            "6911122233344": { name: "999 感冒灵颗粒", spec: "9袋/盒", location: "客厅药箱", category: "感冒发烧", minStock: 2 }
        };

        let supabaseClient = null;
        let medications = [];
        let logs = [];
        let currentFilterLoc = "全部";
        let currentFilterCat = "全部";
        let familyKey = localStorage.getItem('family_key') || '';

        window.onload = function() {
            if (familyKey) {
                document.getElementById('auth-overlay').style.display = 'none';
                initSupabase();
                loadDataFromCloud();
            }
        }

        function verifyPassword() {
            const inputKey = document.getElementById('family-password').value.trim();
            if (!inputKey) return alert('请输入暗号！');
            familyKey = inputKey;
            initSupabase();
            document.getElementById('auth-overlay').style.display = 'none';
            loadDataFromCloud(true); 
        }

        function initSupabase() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                global: { headers: { 'x-family-key': familyKey } }
            });
        }

        async function loadDataFromCloud(isFirstCheck = false) {
            try {
                const { data: meds, error: medErr } = await supabaseClient.from('pillbox').select('*').order('id', { ascending: true });
                if (medErr) throw medErr;

                if (isFirstCheck) localStorage.setItem('family_key', familyKey);
                document.getElementById('storageStatus').innerHTML = '<i class="fa-solid fa-cloud-check"></i> 云数据已就绪';

                medications = meds.map(m => ({
                    id: m.id,
                    name: m.name,
                    spec: m.spec || '',
                    location: m.location || '客厅药箱',
                    category: m.category || '其他', // 映射分类格子
                    expiry: m.expire_date || m.expiry || '',
                    warnDays: m.warn_days || 30,
                    stock: m.count !== undefined ? m.count : m.stock,
                    minStock: m.min_stock || 2,
                    status: m.status || 'normal'
                }));

                logs = medications.map((m, index) => ({
                    id: index,
                    medName: m.name,
                    action: "云端同步成功",
                    qty: m.stock,
                    time: "刚刚"
                }));

                updatePillboxState();
            } catch (e) {
                console.error(e);
                if (isFirstCheck) {
                    alert('暗号错误，请重新输入！');
                    localStorage.removeItem('family_key');
                    document.getElementById('auth-overlay').style.display = 'flex';
                }
            }
        }

        function updatePillboxState() {
            const today = new Date();
            today.setHours(0,0,0,0);

            medications.forEach(med => {
                if (med.status === "discarded") return;
                const expiryDate = new Date(med.expiry);
                expiryDate.setHours(0,0,0,0);
                const diffTime = expiryDate.getTime() - today.getTime();
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays < 0) med.status = "expired";
                else if (diffDays <= (med.warnDays || 30)) med.status = "warning";
                else med.status = "normal";
            });

            renderAll();
        }

        function renderAll() {
            renderDashboard();
            renderMedList();
            renderDiscardedList();
            renderLogs();
        }

        function renderDashboard() {
            const normal = medications.filter(m => m.status === 'normal').length;
            const warning = medications.filter(m => m.status === 'warning').length;
            const expired = medications.filter(m => m.status === 'expired').length;
            const lowStock = medications.filter(m => m.status !== 'discarded' && m.stock <= m.minStock).length;

            document.getElementById('statNormal').textContent = normal;
            document.getElementById('statWarning').textContent = warning;
            document.getElementById('statExpired').textContent = expired;

            const banner = document.getElementById('alertBanner');
            const bannerText = document.getElementById('alertBannerText');
            if (expired > 0 || lowStock > 0 || warning > 0) {
                banner.style.display = "flex";
                bannerText.innerHTML = `提示：<strong>${expired}</strong> 款过期，<strong>${warning}</strong> 款临近失效，<strong>${lowStock}</strong> 款低库存！`;
            } else {
                banner.style.display = "none";
            }
        }

        function renderMedList() {
            const container = document.getElementById('medListContainer');
            container.innerHTML = '';
            
            const searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const activeMeds = medications.filter(m => m.status !== 'discarded');

            if (activeMeds.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--text-muted);">药箱内暂无数据</div>`;
                return;
            }

            activeMeds.forEach(med => {
                // 双重组合过滤过滤过滤
                if (currentFilterLoc !== "全部" && med.location !== currentFilterLoc) return;
                if (currentFilterCat !== "全部" && med.category !== currentFilterCat) return;
                if (searchKeyword && !med.name.toLowerCase().includes(searchKeyword)) return;

                const isLowStock = med.stock <= med.minStock;
                let statusBadge = '';
                let cardClass = '';

                if (med.status === 'expired') { statusBadge = `<span class="badge badge-danger">已过期</span>`; cardClass = 'status-expiry'; }
                else if (med.status === 'warning') { statusBadge = `<span class="badge badge-warning">临近过期</span>`; cardClass = 'status-warning'; }
                if (isLowStock) statusBadge += ` <span class="badge badge-danger">库存低</span>`;

                const card = document.createElement('div');
                card.className = `med-card ${cardClass}`;
                card.setAttribute("onclick", `openEditModal(${med.id})`);
                
                card.innerHTML = `
                    <div class="med-details">
                        <div class="med-title">${med.name} ${statusBadge}</div>
                        <div class="med-spec">规格：${med.spec || '常规'}</div>
                        <div class="med-info-row">
                            <span class="badge badge-category"><i class="fa-solid fa-tags"></i> ${med.category}</span>
                            <span class="badge badge-location"><i class="fa-solid fa-location-dot"></i> ${med.location}</span>
                            <span><i class="fa-solid fa-calendar-days"></i> 效期:${med.expiry}</span>
                        </div>
                    </div>
                    <div class="stock-control" onclick="event.stopPropagation()">
                        <button class="control-btn" onclick="quickChangeStock(${med.id}, -1)">－</button>
                        <span class="stock-num ${isLowStock ? 'low' : ''}">${med.stock}</span>
                        <button class="control-btn" onclick="quickChangeStock(${med.id}, 1)">＋</button>
                    </div>
                    <div onclick="event.stopPropagation()" style="margin-left:8px;">
                        <button class="btn-mini" onclick="discardMed(${med.id})"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderDiscardedList() {
            const container = document.getElementById('discardedListContainer');
            container.innerHTML = '';
            const discardedMeds = medications.filter(m => m.status === 'discarded');

            discardedMeds.forEach(med => {
                const card = document.createElement('div');
                card.className = `med-card status-discarded`;
                card.innerHTML = `
                    <div class="med-details">
                        <div class="med-title">${med.name} <span class="badge badge-discarded">${med.category} · 已归档</span></div>
                        <div class="med-info-row"><span>原位置: ${med.location}</span></div>
                    </div>
                    <button class="control-btn" style="width:auto; padding: 0 8px; border-radius: 6px;" onclick="restoreMed(${med.id})">恢复</button>
                `;
                container.appendChild(card);
            });
        }

        function renderLogs() {
            const container = document.getElementById('logsContainer');
            container.innerHTML = '';
            logs.slice().reverse().forEach(log => {
                const item = document.createElement('div');
                item.className = 'log-item';
                item.innerHTML = `<div><strong>${log.medName}</strong>: ${log.action}</div><div class="log-time">${log.time}</div>`;
                container.appendChild(item);
            });
        }

        async function quickChangeStock(id, change) {
            const med = medications.find(m => m.id === id);
            if (med) {
                const targetStock = Math.max(0, med.stock + change);
                await supabaseClient.from('pillbox').update({ count: targetStock }).eq('id', id);
                loadDataFromCloud();
            }
        }

        async function saveMedication(event) {
            event.preventDefault();
            const formId = document.getElementById('formMedId').value;
            const payload = {
                name: document.getElementById('formName').value,
                category: document.getElementById('formCategory').value, // 收集分类数据传给云端
                spec: document.getElementById('formSpec').value,
                location: document.getElementById('formLocation').value,
                expire_date: document.getElementById('formExpiry').value,
                warn_days: parseInt(document.getElementById('formWarnDays').value) || 30,
                count: parseInt(document.getElementById('formStock').value) || 0,
                min_stock: parseInt(document.getElementById('formMinStock').value) || 0,
                status: 'normal'
            };

            if (formId) await supabaseClient.from('pillbox').update(payload).eq('id', parseInt(formId));
            else await supabaseClient.from('pillbox').insert([payload]);

            closeModal('addModal');
            loadDataFromCloud();
        }

        async function discardMed(id) { await supabaseClient.from('pillbox').update({ status: 'discarded' }).eq('id', id); loadDataFromCloud(); }
        async function restoreMed(id) { await supabaseClient.from('pillbox').update({ status: 'normal' }).eq('id', id); loadDataFromCloud(); }

        function switchPane(paneName, btnElement) {
            document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`pane${paneName}`).classList.add('active');
            btnElement.classList.add('active');
        }

        function switchLocationTab(loc) {
            currentFilterLoc = loc;
            document.querySelectorAll('#locationTabs .tab').forEach(b => b.classList.toggle('active', b.textContent === loc));
            renderMedList();
        }

        function switchCategoryTab(cat) {
            currentFilterCat = cat;
            document.querySelectorAll('#categoryTabs .tab').forEach(b => b.classList.toggle('active-cat', b.textContent === cat));
            renderMedList();
        }

        function filterMeds() { renderMedList(); }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        function checkOuterClick(event, id) { if (event.target.id === id) closeModal(id); }

        function openAddModal() {
            document.getElementById('modalFormTitle').textContent = "💊 手动录入新药";
            document.getElementById('formMedId').value = "";
            document.getElementById('medForm').reset();
            const nextYear = new Date(); nextYear.setFullYear(nextYear.getFullYear() + 1);
            document.getElementById('formExpiry').value = nextYear.toISOString().substring(0, 10);
            document.getElementById('addModal').style.display = "flex";
        }

        function openEditModal(id) {
            const med = medications.find(m => m.id === id);
            if (!med) return;
            document.getElementById('modalFormTitle').textContent = "✏️ 属性修改编辑";
            document.getElementById('formMedId').value = med.id;
            document.getElementById('formName').value = med.name;
            document.getElementById('formCategory').value = med.category; // 回填分类
            document.getElementById('formSpec').value = med.spec;
            document.getElementById('formLocation').value = med.location;
            document.getElementById('formExpiry').value = med.expiry;
            document.getElementById('formWarnDays').value = med.warnDays;
            document.getElementById('formStock').value = med.stock;
            document.getElementById('formMinStock').value = med.minStock;
            document.getElementById('addModal').style.display = "flex";
        }

        function openScanModal() { document.getElementById('scanModal').style.display = "flex"; }
        function openVoiceModal() { document.getElementById('voiceModal').style.display = "flex"; }
